<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>碳水循環計算機</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1a1a18;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .sec-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .gender-btn {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
      font-family: inherit;
    }
    .gender-btn:hover { background: #f5f5f3; }
    .gender-btn.active-m { border: 1.5px solid #185FA5; background: #E6F1FB; color: #185FA5; }
    .gender-btn.active-f { border: 1.5px solid #993556; background: #FBEAF0; color: #993556; }

    .tier-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    .tier-btn {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
    }
    .tier-btn:hover { background: #f5f5f3; }
    .tier-btn.active { border: 1.5px solid #1D9E75; background: #E1F5EE; }
    .tier-btn.active .tn { color: #0F6E56; }
    .tn { font-size: 14px; font-weight: 500; color: #1a1a18; }
    .td { font-size: 12px; color: #888; margin-top: 2px; }
    .tmacro { font-size: 11px; color: #aaa; margin-top: 5px; line-height: 1.6; }

    .custom-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 12px; }
    .custom-field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }

    input[type=number], input[type=range] {
      font-family: inherit;
      font-size: 14px;
    }
    input[type=number] {
      width: 100%;
      padding: 8px 10px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      outline: none;
      color: #1a1a18;
      background: #fff;
    }
    input[type=number]:focus { border-color: rgba(0,0,0,0.4); }
    input[type=range] { width: 100%; accent-color: #1D9E75; }

    .input-row { display: flex; align-items: center; gap: 12px; }
    .input-row input[type=number] { flex: 1; width: auto; }
    .unit { font-size: 14px; color: #888; white-space: nowrap; }

    .day-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .day-controls { display: flex; align-items: center; gap: 8px; }
    .day-btn {
      width: 28px; height: 28px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-family: inherit;
    }
    .day-btn:hover { background: #f5f5f3; }
    .day-controls input[type=number] { width: 48px; text-align: center; }

    .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
    .badge-high { background: #E1F5EE; color: #0F6E56; }
    .badge-low  { background: #F1EFE8; color: #5F5E5A; }

    .slider-block { margin-bottom: 1.25rem; }
    .slider-block:last-child { margin-bottom: 0; }
    .slider-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .slider-title { font-size: 14px; font-weight: 500; color: #1a1a18; }
    .slider-focus { font-size: 11px; color: #aaa; margin-top: 2px; }
    .slider-val { font-size: 13px; color: #888; white-space: nowrap; }
    .slider-val span { color: #1a1a18; font-weight: 500; }
    .slider-ends { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-top: 2px; }

    .result-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
    .rc { background: #f5f5f3; border-radius: 8px; padding: 0.85rem; text-align: center; }
    .rl { font-size: 11px; color: #888; margin-bottom: 4px; }
    .rv { font-size: 20px; font-weight: 500; color: #1a1a18; }
    .ru { font-size: 11px; color: #888; }
    .rcal { font-size: 11px; color: #bbb; margin-top: 3px; }

    .result-day-label { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .mult-tag { font-size: 11px; color: #bbb; }

    .total-row { display: flex; justify-content: space-between; font-size: 13px; color: #888; padding: 4px 0; }
    .total-row span:last-child { color: #1a1a18; font-weight: 500; }
    .divider { border-top: 0.5px solid rgba(0,0,0,0.1); padding-top: 8px; margin-top: 4px; }

    .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }

    .meal-section { margin-top: 1rem; border-top: 0.5px solid rgba(0,0,0,0.08); padding-top: 1rem; }
    .meal-label { font-size: 14px; font-weight: 500; color: #1a1a18; margin-bottom: 12px; }
    .meal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .meal-table th { font-size: 11px; color: #888; font-weight: 400; text-align: right; padding: 4px 6px; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
    .meal-table th:first-child { text-align: left; }
    .meal-table td { text-align: right; padding: 6px 6px; color: #1a1a18; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .meal-table td:first-child { text-align: left; color: #888; }
    .meal-table tr:last-child td { border-bottom: none; }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1a; color: #e8e8e4; }
      h1 { color: #e8e8e4; }
      .card { background: #2a2a28; border-color: rgba(255,255,255,0.1); }
      .gender-btn, .tier-btn, .day-btn { background: #2a2a28; border-color: rgba(255,255,255,0.15); color: #e8e8e4; }
      .gender-btn:hover, .tier-btn:hover, .day-btn:hover { background: #333331; }
      .gender-btn.active-m { background: #0c2a45; color: #7ab8f5; border-color: #7ab8f5; }
      .gender-btn.active-f { background: #3d1626; color: #e88ab0; border-color: #e88ab0; }
      .tier-btn.active { background: #0a2e22; border-color: #1D9E75; }
      .tier-btn.active .tn { color: #5DCAA5; }
      input[type=number] { background: #2a2a28; border-color: rgba(255,255,255,0.15); color: #e8e8e4; }
      .rc { background: #333331; }
      .rl, .ru, .sec-label, .unit, .slider-val, .total-row, .slider-focus, .tmacro, .td { color: #999; }
      .tn, .rv, .slider-title, .meal-label, .total-row span:last-child { color: #e8e8e4; }
      .rcal, .mult-tag, .empty, .slider-ends span { color: #666; }
      .meal-table th, .meal-table td:first-child { color: #999; }
      .meal-table td { color: #e8e8e4; }
      .divider { border-color: rgba(255,255,255,0.1); }
      .meal-section { border-color: rgba(255,255,255,0.08); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>碳水循環計算機</h1>

    <div class="card">
      <div class="sec-label">性別</div>
      <div class="gender-grid">
        <button class="gender-btn" id="btnM" onclick="selectGender('m')">男生</button>
        <button class="gender-btn" id="btnF" onclick="selectGender('f')">女生</button>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">運動級距（每週運動總時數）</div>
      <div class="tier-grid">
        <button class="tier-btn" data-tier="1" onclick="selectTier(1)">
          <div class="tn">第一級</div><div class="td">每週 2–3 小時</div>
          <div class="tmacro" id="macro1"></div>
        </button>
        <button class="tier-btn" data-tier="2" onclick="selectTier(2)">
          <div class="tn">第二級</div><div class="td">每週 4–5 小時</div>
          <div class="tmacro" id="macro2"></div>
        </button>
        <button class="tier-btn" data-tier="3" onclick="selectTier(3)">
          <div class="tn">第三級</div><div class="td">每週 6–7 小時</div>
          <div class="tmacro" id="macro3"></div>
        </button>
        <button class="tier-btn" data-tier="4" onclick="selectTier(4)">
          <div class="tn">第四級</div><div class="td">每週 8–9 小時</div>
          <div class="tmacro" id="macro4"></div>
        </button>
        <button class="tier-btn" data-tier="5" onclick="selectTier(5)" style="grid-column:span 2;">
          <div class="tn">自定義</div>
          <div class="td">自行輸入三大營養素倍數</div>
        </button>
      </div>
      <div id="customInputs" style="display:none;">
        <div class="custom-grid">
          <div class="custom-field">
            <label>碳水倍數</label>
            <input type="number" id="customCarb" placeholder="例如 2.2" min="0.1" max="10" step="0.1" oninput="updateSliderBounds();calculate();" />
          </div>
          <div class="custom-field">
            <label>蛋白質倍數</label>
            <input type="number" id="customProtein" placeholder="例如 1.4" min="0.1" max="10" step="0.1" oninput="calculate();" />
          </div>
          <div class="custom-field">
            <label>脂肪倍數</label>
            <input type="number" id="customFat" placeholder="例如 0.8" min="0.1" max="10" step="0.1" oninput="updateSliderBounds();calculate();" />
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">體重</div>
      <div class="input-row">
        <input type="number" id="weight" placeholder="例如 75" min="30" max="200" oninput="calculate()" />
        <span class="unit">公斤</span>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">高低碳日天數</div>
      <div class="day-row">
        <span class="badge badge-high">高碳日</span>
        <div class="day-controls">
          <button class="day-btn" onclick="adjustDays(-1)"><i class="ti ti-minus" style="font-size:14px"></i></button>
          <input type="number" id="highDays" value="2" min="1" max="6" oninput="clampDays()" style="width:48px;text-align:center;" />
          <button class="day-btn" onclick="adjustDays(1)"><i class="ti ti-plus" style="font-size:14px"></i></button>
        </div>
      </div>
      <div class="day-row" style="margin-bottom:0;">
        <span class="badge badge-low">低碳日</span>
        <span id="lowDaysDisplay" style="font-size:14px;font-weight:500;">5 天</span>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">高低碳落差設定（週總量鎖定）</div>
      <div class="slider-block">
        <div class="slider-header">
          <div>
            <div class="slider-title">碳水化合物</div>
            <div class="slider-focus" id="carbAvgHint">控制高碳日碳水倍數・週平均 — 倍</div>
          </div>
          <div class="slider-val">高碳日 <span id="carbHighVal">—</span> 倍</div>
        </div>
        <input type="range" id="carbSlider" min="0" max="100" value="50" step="1" oninput="calculate()" disabled />
        <div class="slider-ends"><span>← 無落差</span><span>最大落差 →</span></div>
      </div>
      <div class="slider-block">
        <div class="slider-header">
          <div>
            <div class="slider-title">脂肪</div>
            <div class="slider-focus" id="fatAvgHint">控制低碳日脂肪倍數・週平均 — 倍</div>
          </div>
          <div class="slider-val">低碳日 <span id="fatLowVal">—</span> 倍</div>
        </div>
        <input type="range" id="fatSlider" min="0" max="100" value="50" step="1" oninput="calculate()" disabled />
        <div class="slider-ends"><span>← 無落差</span><span>最大落差 →</span></div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">每日餐數</div>
      <div class="input-row">
        <button class="day-btn" onclick="adjustMeals(-1)"><i class="ti ti-minus" style="font-size:14px"></i></button>
        <input type="number" id="mealCount" value="3" min="1" max="8" style="width:60px;text-align:center;" oninput="calculate()" />
        <button class="day-btn" onclick="adjustMeals(1)"><i class="ti ti-plus" style="font-size:14px"></i></button>
        <span class="unit">餐</span>
      </div>
    </div>

    <div id="results"><div class="empty">請選擇性別、級距並輸入體重以查看結果</div></div>
  </div>

  <script>
    const tiersM = {
      1: { carb: 1.7, protein: 1.4, fat: 0.8 },
      2: { carb: 2.0, protein: 1.6, fat: 0.9 },
      3: { carb: 2.4, protein: 1.7, fat: 1.0 },
      4: { carb: 2.8, protein: 1.8, fat: 1.0 },
    };
    const tiersF = {
      1: { carb: 1.7, protein: 1.4, fat: 1.0 },
      2: { carb: 2.0, protein: 1.6, fat: 1.1 },
      3: { carb: 2.4, protein: 1.7, fat: 1.1 },
      4: { carb: 2.8, protein: 1.8, fat: 1.2 },
    };

    const CARB_LOW_MIN = 0.5;
    const FAT_HIGH_MIN = 0.2;

    let selectedGender = null;
    let selectedTier = null;

    function selectGender(g) {
      selectedGender = g;
      document.getElementById('btnM').className = 'gender-btn' + (g === 'm' ? ' active-m' : '');
      document.getElementById('btnF').className = 'gender-btn' + (g === 'f' ? ' active-f' : '');
      updateMacroHints();
      updateSliderBounds();
      calculate();
    }

    function updateMacroHints() {
      const tiers = selectedGender === 'f' ? tiersF : tiersM;
      for (let i = 1; i <= 4; i++) {
        const t = tiers[i];
        document.getElementById('macro' + i).innerHTML =
          '碳水 ' + t.carb + 'x・蛋白質 ' + t.protein + 'x・脂肪 ' + t.fat + 'x';
      }
    }

    function selectTier(t) {
      selectedTier = t;
      document.querySelectorAll('.tier-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-tier="' + t + '"]').classList.add('active');
      document.getElementById('customInputs').style.display = t === 5 ? 'block' : 'none';
      updateSliderBounds();
      calculate();
    }

    function getActiveTier() {
      if (!selectedGender) return null;
      if (selectedTier === 5) {
        const c = parseFloat(document.getElementById('customCarb').value);
        const p = parseFloat(document.getElementById('customProtein').value);
        const f = parseFloat(document.getElementById('customFat').value);
        if (!c || !p || !f) return null;
        return { carb: c, protein: p, fat: f };
      }
      if (!selectedTier) return null;
      return selectedGender === 'f' ? tiersF[selectedTier] : tiersM[selectedTier];
    }

    function adjustDays(d) {
      const el = document.getElementById('highDays');
      el.value = Math.max(1, Math.min(6, parseInt(el.value) + d));
      clampDays();
    }

    function clampDays() {
      const el = document.getElementById('highDays');
      el.value = Math.max(1, Math.min(6, parseInt(el.value) || 1));
      document.getElementById('lowDaysDisplay').textContent = (7 - parseInt(el.value)) + ' 天';
      updateSliderBounds();
      calculate();
    }

    function updateSliderBounds() {
      const t = getActiveTier();
      if (!t) return;
      const hd = parseInt(document.getElementById('highDays').value) || 2;
      const ld = 7 - hd;

      const carbSlider = document.getElementById('carbSlider');
      carbSlider._min = t.carb;
      carbSlider._max = (t.carb * 7 - CARB_LOW_MIN * ld) / hd;
      carbSlider.disabled = false;
      document.getElementById('carbAvgHint').textContent = '控制高碳日碳水倍數・週平均 ' + t.carb.toFixed(1) + ' 倍';

      const fatSlider = document.getElementById('fatSlider');
      fatSlider._min = t.fat;
      fatSlider._max = (t.fat * 7 - FAT_HIGH_MIN * hd) / ld;
      fatSlider.disabled = false;
      document.getElementById('fatAvgHint').textContent = '控制低碳日脂肪倍數・週平均 ' + t.fat.toFixed(1) + ' 倍';
    }

    function sliderToVal(slider) {
      const pct = parseInt(slider.value) / 100;
      return slider._min + pct * (slider._max - slider._min);
    }

    function adjustMeals(d) {
      const el = document.getElementById('mealCount');
      el.value = Math.max(1, Math.min(8, parseInt(el.value) + d));
      calculate();
    }

    function makeMealTable(dayLabel, carb, prot, fat, cal, meals) {
      const mCarb = (carb / meals).toFixed(1);
      const mProt = (prot / meals).toFixed(1);
      const mFat  = (fat  / meals).toFixed(1);
      const mCal  = Math.round(cal / meals);
      let rows = '';
      for (let i = 1; i <= meals; i++) {
        rows += `<tr><td>第 ${i} 餐</td><td>${mCarb} g</td><td>${mProt} g</td><td>${mFat} g</td><td>${mCal} kcal</td></tr>`;
      }
      return `
        <div class="meal-section">
          <div class="meal-label">${dayLabel} 每餐分配</div>
          <table class="meal-table">
            <thead><tr><th></th><th>碳水</th><th>蛋白質</th><th>脂肪</th><th>熱量</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function calculate() {
      const weight = parseFloat(document.getElementById('weight').value);
      const hd = parseInt(document.getElementById('highDays').value) || 2;
      const ld = 7 - hd;
      const meals = parseInt(document.getElementById('mealCount').value) || 3;
      const t = getActiveTier();

      if (!t || !weight || weight < 1) {
        document.getElementById('results').innerHTML = '<div class="empty">請選擇性別、級距並輸入體重以查看結果</div>';
        return;
      }

      const carbSlider = document.getElementById('carbSlider');
      const fatSlider  = document.getElementById('fatSlider');
      if (!carbSlider._min) updateSliderBounds();

      const carbHigh = sliderToVal(carbSlider);
      const carbLow  = (t.carb * 7 - carbHigh * hd) / ld;
      const fatLow   = sliderToVal(fatSlider);
      const fatHigh  = (t.fat * 7 - fatLow * ld) / hd;

      document.getElementById('carbHighVal').textContent = carbHigh.toFixed(2) + 'x';
      document.getElementById('fatLowVal').textContent   = fatLow.toFixed(2) + 'x';

      const prot  = t.protein;
      const hCarb = Math.round(weight * carbHigh);
      const hProt = Math.round(weight * prot);
      const hFat  = Math.round(weight * fatHigh);
      const hCal  = Math.round(hCarb * 4 + hProt * 4 + hFat * 9);
      const lCarb = Math.round(weight * carbLow);
      const lProt = Math.round(weight * prot);
      const lFat  = Math.round(weight * fatLow);
      const lCal  = Math.round(lCarb * 4 + lProt * 4 + lFat * 9);
      const wCarb = Math.round(hCarb * hd + lCarb * ld);
      const wProt = Math.round(hProt * 7);
      const wFat  = Math.round(hFat  * hd + lFat  * ld);
      const wCal  = Math.round(hCal  * hd + lCal  * ld);

      document.getElementById('results').innerHTML = `
        <div class="card">
          <div class="result-day-label">
            <span class="badge badge-high">高碳日</span> × ${hd} 天
            <span class="mult-tag">碳水 ${carbHigh.toFixed(2)}x・脂肪 ${fatHigh.toFixed(2)}x</span>
          </div>
          <div class="result-grid">
            <div class="rc"><div class="rl">碳水</div><div class="rv">${hCarb}</div><div class="ru">g</div><div class="rcal">${Math.round(hCarb*4)} kcal</div></div>
            <div class="rc"><div class="rl">蛋白質</div><div class="rv">${hProt}</div><div class="ru">g</div><div class="rcal">${Math.round(hProt*4)} kcal</div></div>
            <div class="rc"><div class="rl">脂肪</div><div class="rv">${hFat}</div><div class="ru">g</div><div class="rcal">${Math.round(hFat*9)} kcal</div></div>
          </div>
          <div style="text-align:right;font-size:12px;color:#888;">總熱量 ${hCal} kcal／天</div>
          ${makeMealTable('高碳日', hCarb, hProt, hFat, hCal, meals)}
        </div>

        <div class="card">
          <div class="result-day-label">
            <span class="badge badge-low">低碳日</span> × ${ld} 天
            <span class="mult-tag">碳水 ${carbLow.toFixed(2)}x・脂肪 ${fatLow.toFixed(2)}x</span>
          </div>
          <div class="result-grid">
            <div class="rc"><div class="rl">碳水</div><div class="rv">${lCarb}</div><div class="ru">g</div><div class="rcal">${Math.round(lCarb*4)} kcal</div></div>
            <div class="rc"><div class="rl">蛋白質</div><div class="rv">${lProt}</div><div class="ru">g</div><div class="rcal">${Math.round(lProt*4)} kcal</div></div>
            <div class="rc"><div class="rl">脂肪</div><div class="rv">${lFat}</div><div class="ru">g</div><div class="rcal">${Math.round(lFat*9)} kcal</div></div>
          </div>
          <div style="text-align:right;font-size:12px;color:#888;">總熱量 ${lCal} kcal／天</div>
          ${makeMealTable('低碳日', lCarb, lProt, lFat, lCal, meals)}
        </div>

        <div class="card">
          <div class="sec-label">本週總攝取</div>
          <div class="total-row"><span>碳水化合物</span><span>${wCarb} g</span></div>
          <div class="total-row"><span>蛋白質</span><span>${wProt} g</span></div>
          <div class="total-row"><span>脂肪</span><span>${wFat} g</span></div>
          <div class="total-row divider"><span>總熱量</span><span>${wCal.toLocaleString()} kcal</span></div>
        </div>
      `;
    }

    updateMacroHints();
    clampDays();
  </script>
</body>
</html>
